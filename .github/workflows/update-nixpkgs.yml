name: Update nixpkgs

on:
  schedule:
    - cron: '0 3 * * 5'
  workflow_dispatch:

jobs:
  update-lock:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.commit-sha.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake update nixpkgs
      - run: |
          if git diff --quiet -- flake.lock; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "Update nixpkgs"
          git push origin HEAD:main
      - id: commit-sha
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: update-lock
    permissions:
      contents: write
    name: x86_64-linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.update-lock.outputs.commit_sha }}
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@97e5ff84d02b3b4f9936339f767e17f03c9252ed
        with:
          name: iosevka-wliao
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check --print-build-logs --system x86_64-linux
      - run: nix build --print-build-logs .#packages.x86_64-linux.default
      - name: Package release asset
        run: |
          version=$(nix eval --raw .#packages.x86_64-linux.default.version)
          mkdir -p release
          cp result/share/fonts/truetype/* release/
          (cd release && zip -r "../iosevka-custom-ttf-${version}.zip" .)
          echo "version=${version}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-ttf-${{ env.version }}
          path: iosevka-custom-ttf-${{ env.version }}.zip
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${version}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes "Automated release for Iosevka Custom ${version}."
          gh release upload "$tag" iosevka-custom-ttf-${version}.zip --repo "$GITHUB_REPOSITORY" --clobber
