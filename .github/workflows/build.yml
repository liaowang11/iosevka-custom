name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: x86_64-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@97e5ff84d02b3b4f9936339f767e17f03c9252ed
        with:
          name: iosevka-wliao
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}
      - run: nix flake check --print-build-logs --system x86_64-linux
      - run: nix build --print-build-logs .#packages.x86_64-linux.default
